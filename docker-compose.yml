name: veltrix

services:
  postgres:
    image: postgres:16-alpine
    container_name: veltrix-postgres
    environment:
      POSTGRES_USER: veltrix
      POSTGRES_PASSWORD: veltrix
      POSTGRES_DB: veltrix
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veltrix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: veltrix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: veltrix-backend
    environment:
      DB_URL: postgres://veltrix@postgres:5432/veltrix?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: veltrix-dev-secret-key
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
